<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>
        UniPlan — Panel Estudiantil
    </title>

    <!-- Google Fonts premium -->
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
            rel="stylesheet"
    >

    <!-- MISMO STYLE DEL ADMIN -->
    <link
            rel="stylesheet"
            href="/css/home-style.css"
    >

</head>

<body style="display: none;">

    <!-- AUTH GUARD -->
    <script>

        const token =
            sessionStorage.getItem("token");

        const role =
            sessionStorage.getItem("role");



        if (
            !token ||
            role !== "STUDENT"
        ) {

            window.location.href =
                "/login";
        }

        else {

            document.body.style.display =
                "block";
        }

    </script>



    <!-- Fondo con imagen + capa oscura -->
    <div class="bg-image-layer"></div>

    <div class="bg-overlay-dark"></div>



    <!-- Luces ambientales -->
    <div class="ambient-light light-1"></div>

    <div class="ambient-light light-2"></div>



    <!-- Navbar -->
    <nav class="navbar">

        <div class="nav-container">

            <div class="nav-brand">

                <h2 class="brand-title">
                    UniPlan
                </h2>

                <img
                        src="/images/logoIcesi.png"
                        alt="Logo Icesi"
                        class="nav-logo"
                >

            </div>



            <div class="nav-user">

                <span class="user-role">
                    Estudiante
                </span>

                <div class="user-avatar">
                    E
                </div>

                <button
                        class="logout-btn"
                        onclick="logout()"
                >
                    Logout
                </button>

            </div>

        </div>

    </nav>



    <!-- Main content -->
    <main class="dashboard-container">

        <div class="dashboard-header">

            <h1 class="dashboard-title">
                Panel Estudiantil
            </h1>

            <p class="dashboard-subtitle">
                Descubre, participa y gestiona tu experiencia universitaria
            </p>

        </div>



        <!-- Stats Cards -->
        <div class="stats-grid">

            <!-- EVENTOS INSCRITOS -->
            <div class="stat-card glass-card">

                <div class="stat-icon">

                    <svg
                            width="28"
                            height="28"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                    >

                        <rect
                                x="3"
                                y="4"
                                width="18"
                                height="18"
                                rx="2"
                                ry="2"
                        ></rect>

                        <line
                                x1="16"
                                y1="2"
                                x2="16"
                                y2="6"
                        ></line>

                        <line
                                x1="8"
                                y1="2"
                                x2="8"
                                y2="6"
                        ></line>

                    </svg>

                </div>

                <div class="stat-info">

                    <h3>
                        Eventos Inscritos
                    </h3>

                    <p class="stat-number">
                        0
                    </p>

                </div>

            </div>



            <!-- HORAS -->
            <div class="stat-card glass-card">

                <div class="stat-icon">

                    <svg
                            width="28"
                            height="28"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                    >

                        <circle
                                cx="12"
                                cy="12"
                                r="10"
                        ></circle>

                        <polyline
                                points="12 6 12 12 16 14"
                        ></polyline>

                    </svg>

                </div>

                <div class="stat-info">

                    <h3>
                        Horas Acumuladas
                    </h3>

                    <p class="stat-number">
                        0
                    </p>

                </div>

            </div>



            <!-- EVENTOS COMPLETADOS -->
            <div class="stat-card glass-card">

                <div class="stat-icon">

                    <svg
                            width="28"
                            height="28"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                    >

                        <path d="M20 6L9 17l-5-5"></path>

                    </svg>

                </div>

                <div class="stat-info">

                    <h3>
                        Eventos Completados
                    </h3>

                    <p class="stat-number">
                        0
                    </p>

                </div>

            </div>



            <!-- PRÓXIMO EVENTO -->
            <div class="stat-card glass-card">

                <div class="stat-icon">

                    <svg
                            width="28"
                            height="28"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                    >

                        <path d="M3 12h18"></path>

                        <path d="M12 3v18"></path>

                    </svg>

                </div>

                <div class="stat-info">

                    <h3>
                        Próximo Evento
                    </h3>

                    <p class="stat-number">
                        --
                    </p>

                </div>

            </div>

        </div>



        <!-- EVENTOS DISPONIBLES -->
        <div class="glass-card" style="margin-top:0;">

            <div class="card-header">
                <h2>Explorar eventos</h2>
                <div class="card-actions">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Buscar..."
                        oninput="filterEvents(this.value)"
                        style="padding:0.45rem 0.9rem; border-radius:10px; border:1px solid rgba(255,255,255,0.15);
                               background:rgba(255,255,255,0.06); color:#fff; font-size:0.85rem; width:180px;"
                    >
                </div>
            </div>

            <!-- FILTROS POR TIPO -->
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; padding: 0 0 1rem; margin-top:-0.5rem;">
                <button class="filter-chip active" onclick="setTypeFilter('', this)">Todos</button>
                <button class="filter-chip" onclick="setTypeFilter('ACADEMIC', this)">Académico</button>
                <button class="filter-chip" onclick="setTypeFilter('CULTURAL', this)">Cultural</button>
                <button class="filter-chip" onclick="setTypeFilter('SPORT', this)">Deporte</button>
                <button class="filter-chip" onclick="setTypeFilter('VOLUNTEER', this)">Voluntariado</button>
                <button class="filter-chip" onclick="setTypeFilter('WORKSHOP', this)">Taller</button>
            </div>

            <div id="eventsGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1rem;">
                <p style="color:rgba(255,255,255,0.3); padding:1rem;">Cargando eventos...</p>
            </div>

        </div>

        <!-- MIS INSCRIPCIONES -->
        <div class="glass-card" style="margin-top:1.5rem;">
            <div class="card-header">
                <h2>Mis inscripciones</h2>
            </div>
            <div id="myRegsList">
                <p style="color:rgba(255,255,255,0.3); padding:0.5rem 0; font-size:0.88rem;">Cargando...</p>
            </div>
        </div>

    </main>

    <style>
        .filter-chip {
            padding: 0.3rem 0.85rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-chip.active, .filter-chip:hover {
            background: rgba(139,92,246,0.2);
            border-color: rgba(139,92,246,0.4);
            color: #c4b5fd;
        }
        .event-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.2rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .event-card:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(139,92,246,0.35);
            transform: translateY(-2px);
        }
        .event-card-type {
            font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #a78bfa; margin-bottom: 0.5rem;
        }
        .event-card-title {
            font-size: 0.95rem; font-weight: 700;
            color: rgba(255,255,255,0.92); margin-bottom: 0.4rem; line-height: 1.3;
        }
        .event-card-meta {
            font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-bottom: 0.15rem;
        }
        .event-card-spots {
            margin-top: 0.75rem; padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-between; align-items: center;
        }
        .spots-text { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        .spots-num  { font-size: 0.95rem; font-weight: 700; color: #a78bfa; }
        .my-reg-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.88rem;
        }
        .my-reg-item:last-child { border-bottom: none; }
        .reg-status-chip {
            padding: 0.2rem 0.6rem; border-radius: 12px;
            font-size: 0.7rem; font-weight: 700;
        }
        .chip-registered{ background:rgba(34,197,94,0.15);  color:#86efac; }
        .chip-waitlist  { background:rgba(251,191,36,0.15); color:#fde68a; }
        .chip-cancelled { background:rgba(239,68,68,0.15);  color:#fca5a5; }
        .chip-attended  { background:rgba(139,92,246,0.15); color:#c4b5fd; }
    </style>

    <script src="/js/auth.js"></script>
    <script src="/js/student-home.js"></script>

</body>
</html>
