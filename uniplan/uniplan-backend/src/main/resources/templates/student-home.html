<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Panel Estudiantil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home-style.css">
    <link rel="stylesheet" href="/css/events-style.css">
</head>
<body style="display:none;">

<script>
    const token = sessionStorage.getItem("token");
    const role  = sessionStorage.getItem("role");
    if (!token || role !== "STUDENT") {
        window.location.href = "/login";
    } else {
        document.body.style.display = "block";
    }
</script>

<div class="bg-image-layer"></div>
<div class="bg-overlay-dark"></div>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-brand">
            <h2 class="brand-title">UniPlan</h2>
            <img src="/images/logoIcesi.png" alt="Logo Icesi" class="nav-logo">
        </div>
        <div class="nav-user">
            <span class="user-role">Estudiante</span>
            <div class="user-avatar">E</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<!-- MAIN -->
<main class="dashboard-container">

    <div class="dashboard-header">
        <h1 class="dashboard-title">Panel Estudiantil</h1>
        <p class="dashboard-subtitle">Descubre, participa y gestiona tu experiencia universitaria</p>
    </div>

    <!-- STATS -->
    <div class="stats-grid">

        <div class="stat-card glass-card">
            <div class="stat-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                </svg>
            </div>
            <div class="stat-info">
                <h3>Eventos Inscritos</h3>
                <p class="stat-number" id="statRegistered">—</p>
            </div>
        </div>

        <div class="stat-card glass-card">
            <div class="stat-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </div>
            <div class="stat-info">
                <h3>Horas Acumuladas</h3>
                <p class="stat-number">0</p>
            </div>
        </div>

        <div class="stat-card glass-card">
            <div class="stat-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5"></path>
                </svg>
            </div>
            <div class="stat-info">
                <h3>Eventos Completados</h3>
                <p class="stat-number">0</p>
            </div>
        </div>

        <div class="stat-card glass-card">
            <div class="stat-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M2 12h20"></path>
                </svg>
            </div>
            <div class="stat-info">
                <h3>Eventos disponibles</h3>
                <p class="stat-number" id="statAvailable">—</p>
            </div>
        </div>

    </div>

    <!-- EXPLORAR EVENTOS -->
    <div class="glass-card" style="padding:1.5rem; margin-bottom:1.5rem;">

        <div class="card-header" style="padding:0; border:none; margin-bottom:1rem;">
            <h2>Explorar eventos</h2>
            <input type="text" id="searchInput" class="ev-input"
                   placeholder="Buscar eventos..."
                   oninput="filterBySearch(this.value)"
                   style="width:200px; padding:0.45rem 0.9rem;">
        </div>

        <!-- Filtros -->
        <div class="ev-chip-row">
            <button class="ev-chip active" onclick="setTypeFilter('', this)">Todos</button>
            <button class="ev-chip" onclick="setTypeFilter('ACADEMIC', this)">Académico</button>
            <button class="ev-chip" onclick="setTypeFilter('CULTURAL', this)">Cultural</button>
            <button class="ev-chip" onclick="setTypeFilter('SPORT', this)">Deporte</button>
            <button class="ev-chip" onclick="setTypeFilter('VOLUNTEER', this)">Voluntariado</button>
            <button class="ev-chip" onclick="setTypeFilter('WORKSHOP', this)">Taller</button>
        </div>

        <!-- Grid de eventos -->
        <div id="eventsGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:1rem;">
            <p class="ev-empty">Cargando eventos...</p>
        </div>

    </div>

    <!-- MIS INSCRIPCIONES -->
    <div class="glass-card" style="padding:1.5rem;">

        <div class="card-header" style="padding:0; border:none; margin-bottom:1rem;">
            <h2>Mis inscripciones</h2>
        </div>

        <div id="myRegsList">
            <p class="ev-empty" style="font-size:0.85rem;">Cargando...</p>
        </div>

    </div>

</main>

<script src="/js/auth.js"></script>
<script src="/js/student-home.js"></script>
</body>
</html>
