<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Mis Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home-style.css">
    <link rel="stylesheet" href="/css/events-style.css">
</head>
<body style="display:none;">

<script>
    (function () {
        const token = sessionStorage.getItem("token");
        const role  = sessionStorage.getItem("role");
        if (!token || role !== "ORGANIZER") { window.location.href = "/login"; }
        else { document.body.style.display = "block"; }
    })();
</script>

<div class="bg-image-layer"></div>
<div class="bg-overlay-dark"></div>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<nav class="navbar">
    <div class="nav-container">
        <a href="/organizer/home" class="nav-brand" style="text-decoration:none;">
            <h2 class="brand-title">UniPlan</h2>
            <img src="/images/logoIcesi.png" alt="Logo Icesi" class="nav-logo">
        </a>
        <div class="nav-user">
            <span class="user-role">Organizador</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="dashboard-container">

    <div class="dashboard-header" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
        <div>
            <h1 class="dashboard-title">Mis Eventos</h1>
            <p class="dashboard-subtitle">Gestiona los eventos que has creado.</p>
        </div>
        <a href="/organizer/events/create" class="ev-btn ev-btn-primary" style="text-decoration:none;">
            + Nuevo evento
        </a>
    </div>

    <!-- FILTROS -->
    <div class="glass-card" style="padding:1rem 1.5rem; margin-bottom:1.5rem;">
        <div class="ev-filters">
            <input class="ev-input ev-filter-input" type="text" id="searchInput"
                   placeholder="Buscar por título o lugar..." oninput="applyFilters()">
            <select class="ev-input ev-filter-select" id="statusFilter" onchange="applyFilters()">
                <option value="">Todos los estados</option>
                <option value="ACTIVE">Activo</option>
                <option value="FINISHED">Finalizado</option>
                <option value="CANCELLED">Cancelado</option>
                <option value="DRAFT">Borrador</option>
            </select>
            <select class="ev-input ev-filter-select" id="typeFilter" onchange="applyFilters()">
                <option value="">Todos los tipos</option>
                <option value="ACADEMIC">Académico</option>
                <option value="CULTURAL">Cultural</option>
                <option value="SPORT">Deporte</option>
                <option value="VOLUNTEER">Voluntariado</option>
                <option value="WORKSHOP">Taller</option>
                <option value="OTHER">Otro</option>
            </select>
        </div>
    </div>

    <!-- TABLA -->
    <div class="glass-card" style="padding:0; overflow:hidden;">
        <table class="ev-table">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Tipo</th>
                    <th>Modalidad</th>
                    <th>Lugar</th>
                    <th>Fecha inicio</th>
                    <th>Cupos</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="eventsBody">
                <tr><td colspan="8" class="ev-empty">Cargando eventos...</td></tr>
            </tbody>
        </table>
    </div>

</main>

<script src="/js/auth.js"></script>
<script src="/js/organizer-events.js"></script>
</body>
</html>
