<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Crear Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home-style.css">
    <link rel="stylesheet" href="/css/events-style.css">
</head>
<body style="display:none;">

<script>
    (function () {
        const token = sessionStorage.getItem("token");
        const role  = sessionStorage.getItem("role");
        if (!token || (role !== "ADMIN" && role !== "ORGANIZER")) {
            window.location.href = "/login";
        } else {
            document.body.style.display = "block";
        }
    })();
</script>

<div class="bg-image-layer"></div>
<div class="bg-overlay-dark"></div>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<nav class="navbar">
    <div class="nav-container">
        <a href="/admin/home" class="nav-brand" style="text-decoration:none;">
            <h2 class="brand-title">UniPlan</h2>
            <img src="/images/logoIcesi.png" alt="Logo Icesi" class="nav-logo">
        </a>
        <div class="nav-user">
            <span class="user-role">Crear Evento</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="dashboard-container">

    <div class="dashboard-header">
        <h1 class="dashboard-title">Registrar Evento</h1>
        <p class="dashboard-subtitle">Crea y publica nuevos eventos universitarios en UniPlan.</p>
    </div>

    <div class="glass-card" style="max-width:860px; padding:2rem;">

        <form id="createEventForm" class="ev-form">

            <!-- ── INFORMACIÓN BÁSICA ── -->
            <p class="ev-section-label">Información básica</p>

            <div class="ev-row">
                <div class="ev-field">
                    <label class="ev-label" for="title">Título del evento *</label>
                    <input class="ev-input" type="text" id="title" placeholder="Ej: Hackathon UniPlan 2026" required>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="type">Tipo de evento *</label>
                    <select class="ev-input" id="type" required>
                        <option value="">Selecciona un tipo</option>
                        <option value="ACADEMIC">Académico</option>
                        <option value="CULTURAL">Cultural</option>
                        <option value="SPORT">Deporte</option>
                        <option value="VOLUNTEER">Voluntariado</option>
                        <option value="WORKSHOP">Taller</option>
                        <option value="OTHER">Otro</option>
                    </select>
                </div>
            </div>

            <div class="ev-field">
                <label class="ev-label" for="description">Descripción *</label>
                <textarea class="ev-input" id="description" rows="4" placeholder="Describe el evento..." required></textarea>
            </div>

            <!-- ── FECHAS ── -->
            <p class="ev-section-label">Fechas</p>

            <div class="ev-row">
                <div class="ev-field">
                    <label class="ev-label" for="startDate">Fecha de inicio *</label>
                    <input class="ev-input" type="datetime-local" id="startDate" required>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="endDate">Fecha de finalización *</label>
                    <input class="ev-input" type="datetime-local" id="endDate" required>
                </div>
            </div>

            <!-- ── UBICACIÓN ── -->
            <p class="ev-section-label">Ubicación</p>

            <div class="ev-row">
                <div class="ev-field">
                    <label class="ev-label" for="modality">Modalidad *</label>
                    <select class="ev-input" id="modality" required>
                        <option value="">Selecciona modalidad</option>
                        <option value="IN_PERSON">Presencial</option>
                        <option value="VIRTUAL">Virtual</option>
                        <option value="HYBRID">Híbrido</option>
                    </select>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="venue">Lugar / Salón *</label>
                    <input class="ev-input" type="text" id="venue" placeholder="Ej: Auditorio Principal" required>
                </div>
            </div>

            <div class="ev-row">
                <div class="ev-field">
                    <label class="ev-label" for="campus">Campus / Edificio</label>
                    <input class="ev-input" type="text" id="campus" placeholder="Ej: Campus Norte, Bloque A">
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="room">Sala / Aula</label>
                    <input class="ev-input" type="text" id="room" placeholder="Ej: Sala 302">
                </div>
            </div>

            <div class="ev-field" id="meetingUrlGroup" style="display:none;">
                <label class="ev-label" for="meetingUrl">Enlace de reunión</label>
                <input class="ev-input" type="url" id="meetingUrl" placeholder="https://meet.google.com/...">
            </div>

            <div class="ev-field">
                <label class="ev-label" for="address">Dirección <span class="ev-hint">(eventos fuera del campus)</span></label>
                <input class="ev-input" type="text" id="address" placeholder="Ej: Calle 18 # 122-135, Cali">
            </div>

            <!-- ── CAPACIDAD ── -->
            <p class="ev-section-label">Capacidad</p>

            <div class="ev-row">
                <div class="ev-field">
                    <label class="ev-label" for="capacity">Cupos totales *</label>
                    <input class="ev-input" type="number" id="capacity" min="1" placeholder="Ej: 120" required>
                </div>
                <div class="ev-field ev-field-center">
                    <label class="ev-checkbox">
                        <input type="checkbox" id="waitlistEnabled">
                        Habilitar lista de espera
                    </label>
                </div>
            </div>

            <!-- ── DETALLES POR TIPO (aparecen según selección) ── -->

            <!-- TALLER -->
            <div id="details-WORKSHOP" class="ev-type-details" style="display:none;">
                <p class="ev-section-label">Detalles del taller</p>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="prereqSubjectCode">Código materia prerequisito</label>
                        <input class="ev-input" type="text" id="prereqSubjectCode" placeholder="Ej: MAT101">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="minSemester">Semestre mínimo requerido</label>
                        <input class="ev-input" type="number" id="minSemester" min="1" max="12" placeholder="Ej: 4">
                    </div>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="materialsList">Lista de materiales <span class="ev-hint">(uno por línea)</span></label>
                    <textarea class="ev-input" id="materialsList" rows="3" placeholder="Laptop&#10;Cuaderno&#10;Calculadora"></textarea>
                </div>
            </div>

            <!-- CHARLA / ACADÉMICO -->
            <div id="details-ACADEMIC" class="ev-type-details" style="display:none;">
                <p class="ev-section-label">Información del conferencista</p>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="speakerName">Nombre del conferencista</label>
                        <input class="ev-input" type="text" id="speakerName" placeholder="Ej: Dr. Carlos López">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="speakerAffiliation">Afiliación</label>
                        <input class="ev-input" type="text" id="speakerAffiliation" placeholder="Ej: Universidad Nacional">
                    </div>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="speakerProfile">Perfil / Bio</label>
                    <textarea class="ev-input" id="speakerProfile" rows="2" placeholder="Breve descripción del conferencista..."></textarea>
                </div>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="streamingUrl">Enlace de streaming</label>
                        <input class="ev-input" type="url" id="streamingUrl" placeholder="https://youtube.com/live/...">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="resourcesUrl">Enlace de recursos</label>
                        <input class="ev-input" type="url" id="resourcesUrl" placeholder="https://drive.google.com/...">
                    </div>
                </div>
            </div>

            <!-- TORNEO DEPORTIVO -->
            <div id="details-SPORT" class="ev-type-details" style="display:none;">
                <p class="ev-section-label">Detalles del torneo</p>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="sport">Tipo de deporte</label>
                        <input class="ev-input" type="text" id="sport" placeholder="Ej: Fútbol, Baloncesto...">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="tournamentStructure">Estructura</label>
                        <select class="ev-input" id="tournamentStructure">
                            <option value="">Selecciona estructura</option>
                            <option value="ELIMINATION">Eliminación directa</option>
                            <option value="GROUPS">Fase de grupos</option>
                            <option value="GROUPS_ELIMINATION">Grupos + Eliminación</option>
                            <option value="ROUND_ROBIN">Todos contra todos</option>
                        </select>
                    </div>
                </div>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="teamsCount">Número de equipos</label>
                        <input class="ev-input" type="number" id="teamsCount" min="2" placeholder="Ej: 8">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="participantsPerTeam">Participantes por equipo</label>
                        <input class="ev-input" type="number" id="participantsPerTeam" min="1" placeholder="Ej: 5">
                    </div>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="tournamentRules">Reglas del torneo</label>
                    <textarea class="ev-input" id="tournamentRules" rows="3" placeholder="Describe las reglas específicas..."></textarea>
                </div>
            </div>

            <!-- VOLUNTARIADO -->
            <div id="details-VOLUNTEER" class="ev-type-details" style="display:none;">
                <p class="ev-section-label">Detalles del voluntariado</p>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="minimumHours">Horas mínimas requeridas</label>
                        <input class="ev-input" type="number" id="minimumHours" min="1" placeholder="Ej: 20">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="cause">Causa o comunidad beneficiada</label>
                        <input class="ev-input" type="text" id="cause" placeholder="Ej: Fundación Niños de Luz">
                    </div>
                </div>
                <div class="ev-field">
                    <label class="ev-label" for="activities">Actividades a realizar <span class="ev-hint">(una por línea)</span></label>
                    <textarea class="ev-input" id="activities" rows="3" placeholder="Limpieza de parques&#10;Apoyo escolar&#10;Recolección de alimentos"></textarea>
                </div>
                <div class="ev-row">
                    <div class="ev-field">
                        <label class="ev-label" for="meetingPoints">Puntos de encuentro</label>
                        <input class="ev-input" type="text" id="meetingPoints" placeholder="Ej: Entrada principal Bloque A">
                    </div>
                    <div class="ev-field">
                        <label class="ev-label" for="coordinators">Responsables</label>
                        <input class="ev-input" type="text" id="coordinators" placeholder="Ej: María González, Juan Pérez">
                    </div>
                </div>
            </div>

            <!-- CULTURAL / OTRO — JSON flexible -->
            <div id="details-FLEXIBLE" class="ev-type-details" style="display:none;">
                <p class="ev-section-label">Detalles adicionales</p>
                <div class="ev-field">
                    <label class="ev-label" for="detailsJson">
                        Información extra (JSON)
                        <span class="ev-hint">tags, recursos, etc.</span>
                    </label>
                    <textarea class="ev-input" id="detailsJson" rows="3"
                        placeholder='{"tags":["cultura","arte"],"recursos":"https://..."}'></textarea>
                </div>
            </div>

            <!-- MENSAJE -->
            <div id="message" class="ev-msg" style="display:none;"></div>

            <!-- BOTONES -->
            <div class="ev-actions">
                <a href="/admin/events" class="ev-btn-secondary">← Volver</a>
                <button type="submit" class="ev-btn-primary">Crear Evento →</button>
            </div>

        </form>
    </div>

</main>

<script src="/js/auth.js"></script>
<script src="/js/event.js"></script>
</body>
</html>
