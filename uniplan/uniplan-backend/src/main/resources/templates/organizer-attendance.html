<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Registrar Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home-style.css">
    <link rel="stylesheet" href="/css/events-style.css">
</head>
<body style="display:none;">

<script>
    (function () {
        const token = sessionStorage.getItem("token");
        const role  = sessionStorage.getItem("role");
        if (!token || role !== "ORGANIZER") {
            window.location.href = "/login";
        } else {
            document.body.style.display = "block";
        }
    })();
</script>

<div class="bg-image-layer"></div>
<div class="bg-overlay-dark"></div>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<nav class="navbar">
    <div class="nav-container">
        <a href="/organizer/home" class="nav-brand" style="text-decoration:none;">
            <h2 class="brand-title">UniPlan</h2>
            <img src="/images/logoIcesi.png" alt="Logo Icesi" class="nav-logo">
        </a>
        <div class="nav-user">
            <a href="/organizer/inscriptions" class="add-btn" style="text-decoration:none;">Ver inscritos</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="dashboard-container">

    <div class="dashboard-header">
        <h1 class="dashboard-title">Registrar Asistencia</h1>
        <p class="dashboard-subtitle">Confirma la asistencia de un estudiante inscrito en uno de tus eventos</p>
    </div>

    <div class="glass-card" style="padding:2rem; max-width:560px; margin:0 auto;">

        <form id="attendanceForm" onsubmit="submitAttendance(event)">

            <div class="ev-field-group">
                <label class="ev-label">Mi evento activo</label>
                <select id="eventSelect" class="ev-input" required>
                    <option value="">Cargando tus eventos...</option>
                </select>
            </div>

            <div class="ev-field-group" style="margin-top:1.25rem;">
                <label class="ev-label">Código del estudiante</label>
                <input type="text" id="studentCode" class="ev-input"
                       placeholder="ej. A00123456" required
                       style="text-transform:uppercase;"
                       oninput="this.value = this.value.toUpperCase()">
                <p style="font-size:.78rem; opacity:.55; margin:.35rem 0 0;">
                    Ingresa el ID institucional del estudiante, no su correo.
                </p>
            </div>

            <div id="formMsg" style="margin:.9rem 0; font-size:.875rem; display:none;
                                     padding:.75rem 1rem; border-radius:8px; background:rgba(0,0,0,.25);"></div>

            <div style="display:flex; gap:.75rem; margin-top:1.75rem;">
                <button type="submit" class="add-btn" style="flex:1;">Registrar asistencia</button>
                <a href="/organizer/home" class="logout-btn"
                   style="text-decoration:none; display:flex; align-items:center;
                          justify-content:center; padding:0 1.25rem;">
                    Cancelar
                </a>
            </div>

        </form>

    </div>

    <!-- Lista de asistencias en tiempo real -->
    <div id="attendanceSection" class="glass-card"
         style="padding:1.5rem; max-width:700px; margin:1.25rem auto 0; display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
            <h3 style="margin:0; font-size:1rem;">Asistencias registradas <span id="attendanceCount" style="opacity:.6; font-weight:400;"></span></h3>
            <a id="viewAllLink" href="#" class="add-btn"
               style="text-decoration:none; font-size:.78rem; padding:.3rem .75rem;">Ver página completa</a>
        </div>
        <div id="attendanceListWrap">
            <p class="ev-empty" style="font-size:.83rem;">Cargando...</p>
        </div>
    </div>

</main>

<script src="/js/auth.js"></script>
<script src="/js/organizer-attendance.js"></script>
</body>
</html>
