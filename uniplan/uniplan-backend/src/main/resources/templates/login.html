<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Plataforma Universitaria Inteligente</title>
    
    <!-- Google Fonts premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login-style.css">
</head>
<body>

    <!-- AUTH SESSION CHECK -->
    <script>

        const token =
            sessionStorage.getItem("token");

        const role =
            sessionStorage.getItem("role");



        if (token && role) {

            if (role === "ADMIN") {

                window.location.href =
                    "/admin/home";
            }

            else if (role === "ORGANIZER") {

                window.location.href =
                    "/organizer/home";
            }

            else {

                window.location.href =
                    "/student/home";
            }
        }

    </script>

    <!-- Capa de fondo con imagen -->
    <div class="bg-layer"></div>
    
    <!-- Luces ambientales elegantes -->
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="ambient-light light-3"></div>
    
    <!-- Gradiente de profundidad -->
    <div class="depth-gradient"></div>

    <div class="login-container">

        <div class="glass-card">

            <!-- Reflection premium -->
            <div class="card-reflection"></div>

            <div class="card-glow-border"></div>
            
            <!-- Header -->
            <div class="card-header">

                <div class="brand-header-row">

                    <h1 class="main-title">
                        UniPlan
                    </h1>

                    <img
                            src="/images/logoIcesi.png"
                            alt="Icesi"
                            class="icesi-logo"
                    >

                </div>

                <p class="subtitle">
                    Ingresa a tu entorno universitario
                </p>

            </div>
            
            <!-- FORM -->
            <form id="loginForm">

                <div class="input-group">

                    <label for="email">
                        Correo electrónico
                    </label>

                    <div class="input-field">

                        <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="tu@universidad.edu"
                                autocomplete="email"
                                required
                        >

                        <span class="input-focus-line"></span>

                    </div>

                </div>
                
                <div class="input-group">

                    <label for="password">
                        Contraseña
                    </label>

                    <div class="input-field">

                        <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                        >

                        <span class="input-focus-line"></span>

                    </div>

                </div>
                
                <button
                        type="submit"
                        class="login-button"
                >

                    <span>
                        Iniciar sesión
                    </span>

                    <svg
                            class="button-icon"
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                    >

                        <path
                                d="M5 12H19M19 12L13 6M19 12L13 18"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                        />

                    </svg>

                </button>
                
                <!-- MENSAJE SOLO SI HAY ERROR -->
                <div
                        id="message"
                        style="display: none;"
                ></div>

            </form>
            
            <!-- Separador -->
            <div class="divider">

                <span></span>

            </div>
            
            <!-- Registro -->
            <div class="register-section">

                <span class="register-text">
                    ¿Nuevo en UniPlan?
                </span>

                <a
                        href="/register"
                        class="register-link"
                >
                    Crear cuenta →
                </a>

            </div>

        </div>

    </div>

    <script src="/js/auth.js"></script>

</body>
</html>
