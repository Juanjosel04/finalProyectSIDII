<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Gestión de Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home-style.css">
    <link rel="stylesheet" href="/css/events-style.css">
</head>
<body style="display:none;">

<script>
    (function () {
        const token = sessionStorage.getItem("token");
        const role  = sessionStorage.getItem("role");
        if (!token || (role !== "ADMIN" && role !== "ORGANIZER")) {
            window.location.href = "/login";
        } else {
            document.body.style.display = "block";
        }
    })();
</script>

<div class="bg-image-layer"></div>
<div class="bg-overlay-dark"></div>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<nav class="navbar">
    <div class="nav-container">
        <a href="/admin/home" class="nav-brand" style="text-decoration:none;">
            <h2 class="brand-title">UniPlan</h2>
            <img src="/images/logoIcesi.png" alt="Logo Icesi" class="nav-logo">
        </a>
        <div class="nav-user">
            <a href="/admin/events/create" class="add-btn" style="text-decoration:none;">+ Crear evento</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="dashboard-container">

    <div class="dashboard-header">
        <h1 class="dashboard-title">Gestión de Eventos</h1>
        <p class="dashboard-subtitle">Visualiza, filtra y administra todos los eventos de la plataforma</p>
    </div>

    <div class="glass-card" style="padding:1.5rem;">

        <div class="ev-toolbar">
            <input type="text" id="searchInput" class="ev-search"
                   placeholder="Buscar por título, lugar o tipo..."
                   oninput="applyFilters()">
            <select id="statusFilter" class="ev-filter" onchange="applyFilters()">
                <option value="">Todos los estados</option>
                <option value="ACTIVE">Activos</option>
                <option value="FINISHED">Finalizados</option>
                <option value="CANCELLED">Cancelados</option>
                <option value="DRAFT">Borrador</option>
            </select>
            <select id="typeFilter" class="ev-filter" onchange="applyFilters()">
                <option value="">Todos los tipos</option>
                <option value="ACADEMIC">Académico</option>
                <option value="CULTURAL">Cultural</option>
                <option value="SPORT">Deporte</option>
                <option value="VOLUNTEER">Voluntariado</option>
                <option value="WORKSHOP">Taller</option>
                <option value="OTHER">Otro</option>
            </select>
        </div>

        <div class="ev-table-wrap">
            <table class="ev-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Tipo</th>
                        <th>Modalidad</th>
                        <th>Lugar</th>
                        <th>Inicio</th>
                        <th>Cupos</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="eventsBody">
                    <tr><td colspan="8" class="ev-empty">Cargando eventos...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

</main>

<script src="/js/auth.js"></script>
<script src="/js/admin-events.js"></script>
</body>
</html>
