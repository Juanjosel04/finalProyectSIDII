<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UniPlan — Inscritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/home-style.css">
    <link rel="stylesheet" href="/css/events-style.css">
</head>
<body style="display:none;">

<script>
    (function () {
        const token = sessionStorage.getItem("token");
        const role  = sessionStorage.getItem("role");
        if (!token || role !== "ORGANIZER") {
            window.location.href = "/login";
        } else {
            document.body.style.display = "block";
        }
    })();
</script>

<div class="bg-image-layer"></div>
<div class="bg-overlay-dark"></div>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<nav class="navbar">
    <div class="nav-container">
        <a href="/organizer/home" class="nav-brand" style="text-decoration:none;">
            <h2 class="brand-title">UniPlan</h2>
            <img src="/images/logoIcesi.png" alt="Logo Icesi" class="nav-logo">
        </a>
        <div class="nav-user">
            <a href="/organizer/register-attendance" class="add-btn" style="text-decoration:none;">+ Inscribir estudiante</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<main class="dashboard-container">

    <div class="dashboard-header">
        <h1 class="dashboard-title">Inscritos en mis eventos</h1>
        <p class="dashboard-subtitle">Todas las inscripciones de tus eventos</p>
    </div>

    <div class="glass-card" style="padding:1.5rem;">

        <div class="ev-toolbar">
            <input type="text" id="searchInput" class="ev-search"
                   placeholder="Buscar por estudiante, correo o evento..."
                   oninput="applyFilter()">
            <select id="statusFilter" class="ev-filter" onchange="applyFilter()">
                <option value="">Todos los estados</option>
                <option value="REGISTERED">Inscrito</option>
                <option value="WAITLIST">Lista de espera</option>
                <option value="CANCELLED">Cancelado</option>
                <option value="ATTENDED">Asistió</option>
            </select>
        </div>

        <p id="totalCount" style="font-size:.83rem; opacity:.6; margin:.75rem 0 .25rem;"></p>

        <div id="tableWrap" style="overflow-x:auto; margin-top:.5rem;">
            <p class="ev-empty">Cargando inscripciones...</p>
        </div>

    </div>

</main>

<script src="/js/auth.js"></script>
<script src="/js/organizer-inscriptions.js"></script>
</body>
</html>
